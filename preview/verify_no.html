<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Beach Day Preview (NO)</title>
  <!-- TRMNL CSS Framework -->
  <link rel="stylesheet" href="https://usetrmnl.com/css/latest/plugins.css" />
  
  <style>
    /* Premium High-Contrast E-Ink Friendly Styling */
    .beach-day-layout {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .hero-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 5;
      padding: 32px 24px;
      border-radius: 8px;
      text-align: center;
      box-sizing: border-box;
      margin-right: 20px;
    }

    .hero-panel--yes {
      background-color: #000000;
      color: #ffffff;
      border: 4px solid #000000;
    }

    .hero-panel--no {
      background-color: #ffffff;
      color: #000000;
      border: 4px solid #000000;
    }

    .hero-icon {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .hero-subtitle {
      font-size: 16px;
      margin-top: 10px;
      opacity: 0.8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .details-panel {
      display: flex;
      flex-direction: column;
      flex: 7;
      padding: 24px;
      box-sizing: border-box;
      background-color: #ffffff;
      border: 4px solid #000000;
      border-radius: 8px;
      justify-content: space-between;
    }

    .details-header {
      font-size: 18px;
      font-weight: 800;
      border-bottom: 3px solid #000000;
      padding-bottom: 10px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .details-header .date-meta {
      font-size: 11px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0.7;
    }

    .conditions-table {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }

    .condition-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px;
      border-bottom: 1px dashed #000000;
    }

    .condition-row:last-child {
      border-bottom: none;
    }

    .condition-info {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .condition-name {
      font-size: 14px;
      font-weight: 700;
      color: #000000;
    }

    .condition-threshold {
      font-size: 11px;
      color: #666666;
      margin-top: 1px;
      font-weight: 500;
    }

    .condition-value {
      font-size: 15px;
      font-weight: 700;
      text-align: right;
      margin-right: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .condition-status {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-icon {
      width: 20px;
      height: 20px;
    }

    .status-icon--pass {
      color: #000000;
    }

    .status-icon--fail {
      color: #888888;
      stroke-dasharray: 4;
    }
  </style>
</head>
<body>

  <!-- Static Beach Day NO Render for local verification -->
  <div class="screen" style="width: 800px; height: 480px; position: relative;">
    <div class="view view--full" style="width: 100%; height: 100%; box-sizing: border-box; padding: 20px;">
      <div class="beach-day-layout">
        
        <!-- Left Side: Hero Banner -->
        <div class="hero-panel hero-panel--no">
          <svg class="hero-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 18.6a6 6 0 1 0-8.2-8.2 6 6 0 0 0-3.3 11H17a4 4 0 1 0 0-8h-.3" />
            <line x1="12" y1="18" x2="12" y2="22" stroke-width="2" />
            <line x1="8" y1="18" x2="8" y2="22" stroke-width="2" />
            <line x1="16" y1="18" x2="16" y2="22" stroke-width="2" />
          </svg>
          <div class="hero-title">Stay<br/>Inside</div>
          <div class="hero-subtitle">Not a beach day</div>
        </div>

        <!-- Right Side: Checklist Details -->
        <div class="details-panel">
          <div class="details-header">
            <span>Weather Check</span>
            <span class="date-meta">TRMNL Plugin</span>
          </div>

          <div class="conditions-table">
            
            <!-- Temperature -->
            <div class="condition-row">
              <div class="condition-info">
                <span class="condition-name">High Temperature</span>
                <span class="condition-threshold">Target: &ge; 74&deg;F</span>
              </div>
              <span class="condition-value">76.0&deg;F</span>
              <div class="condition-status">
                <!-- Pass Checkmark SVG -->
                <svg class="status-icon status-icon--pass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>

            <!-- Precipitation -->
            <div class="condition-row">
              <div class="condition-info">
                <span class="condition-name">Precipitation Chance</span>
                <span class="condition-threshold">Target: &lt; 20%</span>
              </div>
              <span class="condition-value">40%</span>
              <div class="condition-status">
                <!-- Fail Cross SVG -->
                <svg class="status-icon status-icon--fail" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </div>
            </div>

            <!-- Wind Speed -->
            <div class="condition-row">
              <div class="condition-info">
                <span class="condition-name">Max Wind Speed</span>
                <span class="condition-threshold">Target: &le; 16 mph</span>
              </div>
              <span class="condition-value">8.0 mph</span>
              <div class="condition-status">
                <svg class="status-icon status-icon--pass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>

            <!-- Forecast -->
            <div class="condition-row">
              <div class="condition-info">
                <span class="condition-name">Forecast Conditions</span>
                <span class="condition-threshold">Target: contains "sunny"</span>
              </div>
              <span class="condition-value" style="font-size:12px; margin-right:12px;">scattered show...</span>
              <div class="condition-status">
                <svg class="status-icon status-icon--fail" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </div>
            </div>

            <!-- Time Limit -->
            <div class="condition-row">
              <div class="condition-info">
                <span class="condition-name">Announce Time window</span>
                <span class="condition-threshold">Target: Sunrise to Sunset-60m</span>
              </div>
              <span class="condition-value" style="font-size:11px; margin-right:12px;">11:46 AM</span>
              <div class="condition-status">
                <svg class="status-icon status-icon--pass" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
